services:
  jellyfin:
    image: jellyfin/jellyfin:10.9.11
    container_name: mortar-jellyfin
    ports:
      - "8096:8096"
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
    environment:
      - JELLYFIN_PublishedServerUrl=http://localhost:8096
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr:1.9.2
    container_name: mortar-jellyseerr
    ports:
      - "5055:5055"
    volumes:
      - jellyseerr-config:/app/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5055/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.13
    container_name: mortar-sonarr
    ports:
      - "8989:8989"
    volumes:
      - sonarr-config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:5.14.0
    container_name: mortar-radarr
    ports:
      - "7878:7878"
    volumes:
      - radarr-config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:4.3.3
    container_name: mortar-sabnzbd
    ports:
      - "8080:8080"
    volumes:
      - sabnzbd-config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/sabnzbd/api?mode=version&output=json"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  jellyfin-config:
  jellyfin-cache:
  jellyseerr-config:
  sonarr-config:
  radarr-config:
  sabnzbd-config:
