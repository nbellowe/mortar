apiVersion: apps/v1
kind: Deployment
metadata:
  name: mortar
  namespace: mortar-test
  labels:
    app.kubernetes.io/name: mortar
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mortar
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mortar
        app.kubernetes.io/part-of: homelab
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mortar
          image: ghcr.io/nbellowe/mortar:latest
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /data/config.yaml
              subPath: config.yaml
      volumes:
        - name: data
          emptyDir: {}
        - name: config
          secret:
            secretName: mortar-config
